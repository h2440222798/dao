name: Build and Deploy

on:
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Deploy target (all / frontend / backend)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - frontend
          - backend

env:
  REGISTRY: crpi-bg707mmzowonrkt4.cn-beijing.personal.cr.aliyuncs.com
  FRONTEND_IMAGE: crpi-bg707mmzowonrkt4.cn-beijing.personal.cr.aliyuncs.com/daojiawuxing/frontend
  BACKEND_IMAGE: crpi-bg707mmzowonrkt4.cn-beijing.personal.cr.aliyuncs.com/daojiawuxing/backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate timestamp tag
        id: tag
        run: echo "TAG=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        if: inputs.deploy_target == 'all' || inputs.deploy_target == 'frontend'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push backend
        if: inputs.deploy_target == 'all' || inputs.deploy_target == 'backend'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Encode docker-compose for transfer
        id: compose
        run: echo "B64=$(base64 -w0 deploy/docker-compose.yml)" >> $GITHUB_OUTPUT

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        env:
          COMPOSE_B64: ${{ steps.compose.outputs.B64 }}
          REGISTRY: ${{ env.REGISTRY }}
          FRONTEND_IMAGE: ${{ env.FRONTEND_IMAGE }}
          BACKEND_IMAGE: ${{ env.BACKEND_IMAGE }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          DEPLOY_TARGET: ${{ inputs.deploy_target }}
          IMAGE_TAG: ${{ steps.tag.outputs.TAG }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          envs: COMPOSE_B64,REGISTRY,FRONTEND_IMAGE,BACKEND_IMAGE,ACR_USERNAME,ACR_PASSWORD,DEPLOY_TARGET,IMAGE_TAG
          script: |
            set -e
            DEPLOY_DIR="/opt/daojiawuxing"
            mkdir -p $DEPLOY_DIR
            cd $DEPLOY_DIR

            upsert_env() {
              key="$1"
              value="$2"
              if grep -q "^${key}=" .env 2>/dev/null; then
                sed -i "s|^${key}=.*|${key}=${value}|" .env
              else
                echo "${key}=${value}" >> .env
              fi
            }

            echo "$COMPOSE_B64" | base64 -d > docker-compose.yml
            echo "docker-compose.yml written ($(wc -l < docker-compose.yml) lines)"

            touch .env

            DB_HOST_VALUE="101.34.246.109"
            DB_PORT_VALUE="3306"
            DB_NAME_VALUE="daojiawuxing"
            DB_USERNAME_VALUE="root"
            DB_PASSWORD_VALUE="zhangsan@123"
            DEFAULT_JDBC_URL="jdbc:mysql://${DB_HOST_VALUE}:${DB_PORT_VALUE}/${DB_NAME_VALUE}?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&connectTimeout=10000&socketTimeout=60000"

            upsert_env "APP_PORT" "${APP_PORT:-8080}"
            upsert_env "DB_HOST" "${DB_HOST_VALUE}"
            upsert_env "DB_PORT" "${DB_PORT_VALUE}"
            upsert_env "DB_NAME" "${DB_NAME_VALUE}"
            upsert_env "DB_USERNAME" "${DB_USERNAME_VALUE}"
            upsert_env "DB_PASSWORD" "${DB_PASSWORD_VALUE}"
            upsert_env "SPRING_DATASOURCE_URL" "${DEFAULT_JDBC_URL}"
            upsert_env "SPRING_DATASOURCE_USERNAME" "${DB_USERNAME_VALUE}"
            upsert_env "SPRING_DATASOURCE_PASSWORD" "${DB_PASSWORD_VALUE}"
            upsert_env "REDIS_HOST" "${REDIS_HOST:-localhost}"
            upsert_env "REDIS_PORT" "${REDIS_PORT:-6379}"
            upsert_env "REDIS_PASSWORD" "${REDIS_PASSWORD:-}"
            upsert_env "REDIS_DATABASE" "${REDIS_DATABASE:-1}"

            echo "$ACR_PASSWORD" | docker login "$REGISTRY" -u "$ACR_USERNAME" --password-stdin

            if [ "$DEPLOY_TARGET" = "all" ] || [ "$DEPLOY_TARGET" = "frontend" ]; then
              docker pull "${FRONTEND_IMAGE}:${IMAGE_TAG}"
            fi
            if [ "$DEPLOY_TARGET" = "all" ] || [ "$DEPLOY_TARGET" = "backend" ]; then
              docker pull "${BACKEND_IMAGE}:${IMAGE_TAG}"
            fi

            export IMAGE_TAG="${IMAGE_TAG}"
            docker compose down --remove-orphans || true
            docker compose up -d --force-recreate --remove-orphans

            sleep 10

            docker image prune -f
            # 保留最近 3 个版本的镜像，清理更早的
            docker images --format "{{.Repository}}:{{.Tag}}" \
              | grep "daojiawuxing" \
              | sort -r | tail -n +4 \
              | xargs -r docker rmi -f 2>/dev/null || true

            echo "Deploy done! Tag: $IMAGE_TAG"
