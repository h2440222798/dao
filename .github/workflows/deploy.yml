name: Build and Deploy

on:
  workflow_dispatch:
    inputs:
      deploy_target:
        description: '部署目标'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - frontend
          - backend

env:
  # 阿里云 ACR 镜像地址
  REGISTRY: crpi-bg707mmzowonrkt4.cn-beijing.personal.cr.aliyuncs.com
  FRONTEND_IMAGE: crpi-bg707mmzowonrkt4.cn-beijing.personal.cr.aliyuncs.com/daojiawuxing/frontend
  BACKEND_IMAGE: crpi-bg707mmzowonrkt4.cn-beijing.personal.cr.aliyuncs.com/daojiawuxing/backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate timestamp tag
        id: tag
        run: echo "TAG=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ===== 前端构建 =====
      - name: Build and push frontend
        if: inputs.deploy_target == 'all' || inputs.deploy_target == 'frontend'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.TAG }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ===== 后端构建 =====
      - name: Build and push backend
        if: inputs.deploy_target == 'all' || inputs.deploy_target == 'backend'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.TAG }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ===== 部署到云服务器 =====
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e
            DEPLOY_DIR="/opt/daojiawuxing"
            mkdir -p $DEPLOY_DIR
            cd $DEPLOY_DIR

            # 登录阿里云 ACR
            docker login ${{ env.REGISTRY }} \
              -u ${{ secrets.ACR_USERNAME }} \
              -p ${{ secrets.ACR_PASSWORD }}

            # 拉取最新镜像
            if [ "${{ inputs.deploy_target }}" = "all" ] || [ "${{ inputs.deploy_target }}" = "frontend" ]; then
              docker pull ${{ env.FRONTEND_IMAGE }}:latest
            fi
            if [ "${{ inputs.deploy_target }}" = "all" ] || [ "${{ inputs.deploy_target }}" = "backend" ]; then
              docker pull ${{ env.BACKEND_IMAGE }}:latest
            fi

            # 启动/更新服务
            docker compose up -d --remove-orphans

            # 等待服务就绪
            sleep 10

            # 清理旧镜像（保留最近 3 个时间戳版本，清理悬空镜像）
            docker image prune -f
            docker images --format "{{.Repository}}:{{.Tag}} {{.ID}}" \
              | grep "daojiawuxing" | grep -v "latest" \
              | tail -n +4 | awk '{print $2}' \
              | xargs -r docker rmi -f 2>/dev/null || true

            echo "部署完成！时间戳: ${{ steps.tag.outputs.TAG }}"
