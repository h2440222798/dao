name: Build and Deploy

on:
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Deploy target (all / frontend / backend)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - frontend
          - backend

env:
  REGISTRY: crpi-bg707mmzowonrkt4.cn-beijing.personal.cr.aliyuncs.com
  FRONTEND_IMAGE: crpi-bg707mmzowonrkt4.cn-beijing.personal.cr.aliyuncs.com/daojiawuxing/frontend
  BACKEND_IMAGE: crpi-bg707mmzowonrkt4.cn-beijing.personal.cr.aliyuncs.com/daojiawuxing/backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate timestamp tag
        id: tag
        run: echo "TAG=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        if: inputs.deploy_target == 'all' || inputs.deploy_target == 'frontend'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.TAG }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push backend
        if: inputs.deploy_target == 'all' || inputs.deploy_target == 'backend'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.TAG }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e
            DEPLOY_DIR="/opt/daojiawuxing"
            mkdir -p $DEPLOY_DIR
            cd $DEPLOY_DIR

            docker login ${{ env.REGISTRY }} \
              -u ${{ secrets.ACR_USERNAME }} \
              -p ${{ secrets.ACR_PASSWORD }}

            if [ "${{ inputs.deploy_target }}" = "all" ] || [ "${{ inputs.deploy_target }}" = "frontend" ]; then
              docker pull ${{ env.FRONTEND_IMAGE }}:latest
            fi
            if [ "${{ inputs.deploy_target }}" = "all" ] || [ "${{ inputs.deploy_target }}" = "backend" ]; then
              docker pull ${{ env.BACKEND_IMAGE }}:latest
            fi

            docker compose up -d --remove-orphans

            sleep 10

            docker image prune -f
            docker images --format "{{.Repository}}:{{.Tag}} {{.ID}}" \
              | grep "daojiawuxing" | grep -v "latest" \
              | tail -n +4 | awk '{print $2}' \
              | xargs -r docker rmi -f 2>/dev/null || true

            echo "Deploy done! Tag: ${{ steps.tag.outputs.TAG }}"