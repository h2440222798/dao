name: Build and Deploy

on:
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Deploy target (all / frontend / backend)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - frontend
          - backend

env:
  REGISTRY: crpi-bg707mmzowonrkt4.cn-beijing.personal.cr.aliyuncs.com
  FRONTEND_IMAGE: crpi-bg707mmzowonrkt4.cn-beijing.personal.cr.aliyuncs.com/daojiawuxing/frontend
  BACKEND_IMAGE: crpi-bg707mmzowonrkt4.cn-beijing.personal.cr.aliyuncs.com/daojiawuxing/backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate timestamp tag
        id: tag
        run: echo "TAG=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        if: inputs.deploy_target == 'all' || inputs.deploy_target == 'frontend'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.TAG }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push backend
        if: inputs.deploy_target == 'all' || inputs.deploy_target == 'backend'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.TAG }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Encode docker-compose for transfer
        id: compose
        run: echo "B64=$(base64 -w0 deploy/docker-compose.yml)" >> $GITHUB_OUTPUT

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        env:
          COMPOSE_B64: ${{ steps.compose.outputs.B64 }}
          REGISTRY: ${{ env.REGISTRY }}
          FRONTEND_IMAGE: ${{ env.FRONTEND_IMAGE }}
          BACKEND_IMAGE: ${{ env.BACKEND_IMAGE }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          DEPLOY_TARGET: ${{ inputs.deploy_target }}
          IMAGE_TAG: ${{ steps.tag.outputs.TAG }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          envs: COMPOSE_B64,REGISTRY,FRONTEND_IMAGE,BACKEND_IMAGE,ACR_USERNAME,ACR_PASSWORD,DEPLOY_TARGET,IMAGE_TAG
          script: |
            set -e
            DEPLOY_DIR="/opt/daojiawuxing"
            mkdir -p $DEPLOY_DIR
            cd $DEPLOY_DIR

            echo "$COMPOSE_B64" | base64 -d > docker-compose.yml
            echo "docker-compose.yml written ($(wc -l < docker-compose.yml) lines)"

            if [ ! -f .env ]; then
              echo "APP_PORT=80"          > .env
              echo "DB_HOST=host.docker.internal" >> .env
              echo "DB_PORT=3306"        >> .env
              echo "DB_NAME=daojiawuxing" >> .env
              echo "DB_USERNAME=root"    >> .env
              echo "DB_PASSWORD=your_mysql_password" >> .env
              echo "REDIS_HOST=localhost" >> .env
              echo "REDIS_PORT=6379"     >> .env
              echo "REDIS_PASSWORD="     >> .env
              echo "REDIS_DATABASE=1"    >> .env
              echo "WARN: .env created - run: vi $DEPLOY_DIR/.env  and set DB_PASSWORD"
            fi

            echo "$ACR_PASSWORD" | docker login "$REGISTRY" -u "$ACR_USERNAME" --password-stdin

            if [ "$DEPLOY_TARGET" = "all" ] || [ "$DEPLOY_TARGET" = "frontend" ]; then
              docker pull "${FRONTEND_IMAGE}:latest"
            fi
            if [ "$DEPLOY_TARGET" = "all" ] || [ "$DEPLOY_TARGET" = "backend" ]; then
              docker pull "${BACKEND_IMAGE}:latest"
            fi

            docker compose up -d --remove-orphans

            sleep 10

            docker image prune -f
            docker images --format "{{.Repository}}:{{.Tag}} {{.ID}}" \
              | grep "daojiawuxing" | grep -v "latest" \
              | tail -n +4 | awk '{print $2}' \
              | xargs -r docker rmi -f 2>/dev/null || true

            echo "Deploy done! Tag: $IMAGE_TAG"