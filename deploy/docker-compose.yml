services:
  backend:
    image: crpi-bg707mmzowonrkt4.cn-beijing.personal.cr.aliyuncs.com/daojiawuxing/backend:${IMAGE_TAG}
    container_name: daojiawuxing-backend
    restart: unless-stopped
    environment:
      - DB_HOST=${DB_HOST:-host.docker.internal}
      - DB_PORT=${DB_PORT:-3306}
      - DB_NAME=${DB_NAME:-daojiawuxing}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=${REDIS_HOST:-localhost}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_DATABASE=${REDIS_DATABASE:-1}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 768M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8101/api/doc.html"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - app-network

  frontend:
    image: crpi-bg707mmzowonrkt4.cn-beijing.personal.cr.aliyuncs.com/daojiawuxing/frontend:${IMAGE_TAG}
    container_name: daojiawuxing-frontend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          memory: 32M
    depends_on:
      backend:
        condition: service_started
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
